<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>台中旅遊：看風景 放輕鬆</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #faf6f0;
            --warm-brown: #8b5e3c;
            --terracotta: #c97941;
            --ink: #1e1a16;
            --mist: #e8e0d5;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; }

        body {
            background-color: var(--cream);
            color: var(--ink);
            font-family: 'Noto Serif TC', serif;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 頂部橫幅 */
        .hero {
            height: 40vh;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.4)), 
                        url('https://travel.taichung.gov.tw/image/24379/1024x768') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        .hero-title { font-size: clamp(2rem, 8vw, 3rem); font-weight: 900; text-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* 導航列 */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(250, 246, 240, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 15px 0;
            border-bottom: 1px solid var(--mist);
        }

        .nav-link {
            text-decoration: none;
            color: var(--warm-brown);
            font-weight: 700;
            font-size: 1rem;
            padding: 5px 10px;
            transition: 0.3s;
        }

        .nav-link.active { color: var(--terracotta); border-bottom: 2px solid var(--terracotta); }

        /* 內容區：自適應網格 */
        main { flex: 1; padding: 30px 20px; max-width: 1000px; margin: 0 auto; width: 100%; }
        
        .section { display: none; animation: fadeIn 0.5s ease forwards; }
        .section.active { 
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 卡片設計 */
        .item-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            border: 1px solid var(--mist);
        }

        .card-img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 20px; }
        .card-body h3 { font-size: 1.3rem; margin-bottom: 10px; color: var(--warm-brown); }
        .card-body p { font-size: 0.95rem; color: #555; text-align: justify; }

        footer {
            text-align: center;
            padding: 40px 20px calc(20px + var(--safe-bottom));
            font-size: 0.8rem;
            color: #999;
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1 class="hero-title">台中旅遊誌</h1>
    </section>

    <nav>
        <a href="javascript:void(0)" class="nav-link active" onclick="switchTab('food', this)">在地美食</a>
        <a href="javascript:void(0)" class="nav-link" onclick="switchTab('landmarks', this)">地標建築</a>
    </nav>

    <main>
        <section id="food" class="section active">
            <div class="item-card">
                <img src="https://utility.displayimage.taichung.gov.tw/Utility/DisplayImage?id=25381" class="card-img" alt="太陽餅">
                <div class="card-body">
                    <h3>太陽餅</h3>
                    <p>台中經典代名詞。千層酥脆的外皮與溫潤麥芽內餡，每一口都是傳承百年的道地好滋味。</p>
                </div>
            </div>
        </section>

        <section id="landmarks" class="section">
            <div class="item-card">
                <img src="https://travel.taichung.gov.tw/image/24379/1024x768" class="card-img" alt="歌劇院">
                <div class="card-body">
                    <h3>國家歌劇院</h3>
                    <p>由大師伊東豊雄設計，獨特的無樑柱曲牆結構，是台中最具辨識度的藝文殿堂。</p>
                </div>
            </div>
            <div class="item-card">
                <img src="https://travel.taichung.gov.tw/Utility/DisplayImage?id=25574" class="card-img" alt="高美濕地">
                <div class="card-body">
                    <h3>高美濕地</h3>
                    <p>世界級絕美落日，結合豐富生態與木棧道地景，是放鬆心靈的絕佳去處。</p>
                </div>
            </div>
        </section>
    </main>

    <footer>© 2026 台中旅遊誌 · 看風景 放輕鬆</footer>

    <script>
        function switchTab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }
    </script>
</body>
</html>
